# Pebble logo DAG.
#
# The approved material board is kept because the palette/material is correct.
# Rejected logo outputs are intentionally excluded because the shape was wrong.
tasks:
  - id: logo-negative-caret
    name: 01-logo-negative-caret
    provider: mox
    model: gpt-image-2
    ratio: "1:1"
    refs:
      - "resources/brand/generated/pebble-foundation/01-foundation-material-board.png"
    prompt: >-
      Professional logo exploration for Pebble, a warm technical AI workspace.
      Use the referenced material board only for color and tactile mood. Design
      a compact, single-piece pebble emblem: one smooth rounded stone silhouette
      with a clean negative-space terminal caret or path cut through it. The
      mark should feel like "I found this small useful thing and sent it to
      you" while remaining precise and technical. Flat vector-first geometry,
      minimal material hint, centered, high contrast, app icon ready, strong at
      48 px. Absolutely avoid anatomical or sexual silhouettes, no large oval
      plus small oval pairing, no protruding shaft, no droplet, no mascot, no
      animal, no text, no letter P, no legacy whale mark, no watermark.

  - id: logo-pebble-orbit
    name: 02-logo-pebble-orbit
    provider: mox
    model: gpt-image-2
    ratio: "1:1"
    refs:
      - "resources/brand/generated/pebble-foundation/01-foundation-material-board.png"
    prompt: >-
      Professional logo exploration for Pebble using the referenced material
      board for palette only. Create a simple geometric mark made from three
      small rounded pebble dots in an orbital send/share motion around an empty
      center, like a tiny thought being passed along. Balanced, compact,
      friendly, technical, vector-friendly, no realistic stone pile, no body
      part resemblance, no one-large-one-small oval composition, no shaft or
      protrusion, no mascot, no animal, no text, no letter P, no legacy whale
      mark, no watermark.

  - id: logo-cairn-signal
    name: 03-logo-cairn-signal
    provider: mox
    model: gpt-image-2
    ratio: "1:1"
    refs:
      - "resources/brand/generated/pebble-foundation/01-foundation-material-board.png"
    prompt: >-
      Professional logo exploration for Pebble using the referenced material
      board for color and texture. Create a compact cairn symbol: three
      flattened rounded stones stacked horizontally with stable spacing,
      simplified like a modern app logo. It should suggest small contributions
      building durable work. Keep it abstract and geometric, not realistic, no
      phallic or anatomical silhouette, no one-large-one-small oval pairing, no
      vertical shaft, no droplet, no face, no mascot, no animal, no text, no
      letter P, no legacy whale mark, no watermark.

  - id: logo-pocket-stone
    name: 04-logo-pocket-stone
    provider: mox
    model: gpt-image-2
    ratio: "1:1"
    refs:
      - "resources/brand/generated/pebble-foundation/01-foundation-material-board.png"
    prompt: >-
      Professional logo exploration for Pebble with the referenced material
      board as palette inspiration. Design a single pocket-stone emblem: a
      soft squircle-like pebble with one small inset sparkle or cut mark,
      implying a selected thought. Minimal, soft, sophisticated, vector-first,
      2026 tactile flat design, high contrast, centered. Avoid any shape that
      resembles body parts, no double oval composition, no shaft, no protruding
      tip, no droplet, no mascot, no animal, no text, no letter P, no legacy
      whale mark, no watermark.

  - id: logo-ripple-share
    name: 05-logo-ripple-share
    provider: mox
    model: gpt-image-2
    ratio: "1:1"
    refs:
      - "resources/brand/generated/pebble-foundation/01-foundation-material-board.png"
    prompt: >-
      Professional logo exploration for Pebble using the referenced material
      board for softness and palette. Create an abstract ripple mark: one small
      pebble dot and two rounded concentric path strokes, like a thoughtful
      share signal traveling outward. Clean vector geometry, calm technical
      product feeling, no literal water scene, no body-part silhouette, no
      large-small oval pair, no shaft, no droplet, no mascot, no animal, no
      text, no letter P, no legacy whale mark, no watermark.

  - id: logo-folded-stone
    name: 06-logo-folded-stone
    provider: mox
    model: gpt-image-2
    ratio: "1:1"
    refs:
      - "resources/brand/generated/pebble-foundation/01-foundation-material-board.png"
    prompt: >-
      Professional logo exploration for Pebble using the referenced material
      board for palette and tactile finish. Create a single folded-stone
      emblem: an abstract rounded pebble with a diagonal soft crease suggesting
      a message being tucked into a pocket. Compact, modern, vector-first, no
      literal envelope, no anatomical shape, no two-oval pairing, no vertical
      shaft, no protrusion, no droplet, no mascot, no animal, no text, no
      letter P, no legacy whale mark, no watermark.

  - id: logo-contact-sheet
    name: 07-logo-contact-sheet
    provider: mox
    model: gpt-image-2
    ratio: "16:9"
    refs:
      - "@logo-negative-caret"
      - "@logo-pebble-orbit"
      - "@logo-cairn-signal"
      - "@logo-pocket-stone"
      - "@logo-ripple-share"
      - "@logo-folded-stone"
    prompt: >-
      Create a clean contact sheet showing the six referenced Pebble logo
      explorations as equal-size app-logo candidates on a neutral warm
      background. Keep exact silhouettes recognizable, no generated labels, no
      text, no animal, no watermark.
