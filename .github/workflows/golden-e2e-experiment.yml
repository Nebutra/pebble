name: Tauri Golden Evidence Experiment

on:
  pull_request:
    paths:
      - '.github/workflows/golden-e2e-experiment.yml'
      - 'apps/desktop/**'
      - 'packages/product-core/renderer/**'
      - 'config/scripts/run-tauri-real-runtime-gate.mjs'
      - 'config/scripts/run-tauri-terminal-evidence.mjs'
  workflow_dispatch:
    inputs:
      ref:
        description: Ref to check out (defaults to the workflow ref)
        required: false
        type: string

jobs:
  golden-evidence:
    name: Tauri golden evidence ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-15
            platform: macos
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: runtime/go/go.mod
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y at-spi2-core dbus-x11 gir1.2-atspi-2.0 libwebkit2gtk-4.1-dev libappindicator3-dev python3-gi librsvg2-dev patchelf xvfb
      - run: pnpm install --frozen-lockfile
      - name: Capture Tauri golden evidence on Linux
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum dbus-run-session -- node config/scripts/run-tauri-terminal-evidence.mjs --mode golden --output artifacts/tauri-golden/report.json
      - name: Capture Tauri golden evidence on macOS
        if: runner.os == 'macOS'
        run: node config/scripts/run-tauri-terminal-evidence.mjs --mode golden --output artifacts/tauri-golden/report.json
      - name: Upload Tauri golden evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tauri-golden-${{ matrix.platform }}
          path: artifacts/tauri-golden*
          retention-days: 14
          if-no-files-found: error
