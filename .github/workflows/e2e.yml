name: Tauri E2E

on:
  pull_request:
    paths:
      - '.github/workflows/e2e.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tests/e2e/**'
      - 'tests/playwright.config.ts'
      - 'packages/product-core/renderer/**'
      - 'apps/desktop/src/**'
      - 'apps/desktop/src-tauri/**'
      - 'runtime/go/**'
      - 'config/scripts/run-tauri-real-runtime-gate.mjs'
      - 'config/scripts/run-tauri-terminal-evidence.mjs'
  workflow_call:
    inputs:
      ref:
        description: Ref to check out (defaults to the calling workflow's ref)
        required: false
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Ref to check out (defaults to the workflow ref)
        required: false
        type: string
  schedule:
    - cron: '0 17,22 * * *'

jobs:
  browser-renderer:
    name: Browser renderer supporting E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Cache Playwright Chromium
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium system dependencies
        run: pnpm exec playwright install --with-deps chromium
      - name: Run browser renderer supporting evidence
        run: pnpm test:e2e:browser
      - name: Upload browser E2E failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-renderer-supporting-e2e-failure
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  tauri-functional:
    name: Tauri functional ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-15
            platform: macos
          - os: windows-latest
            platform: windows
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: runtime/go/go.mod
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y at-spi2-core dbus-x11 gir1.2-atspi-2.0 libwebkit2gtk-4.1-dev libappindicator3-dev python3-gi librsvg2-dev patchelf xvfb
      - run: pnpm install --frozen-lockfile
      - name: Run Tauri functional evidence on Linux
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum dbus-run-session -- pnpm verify:tauri-real-runtime
      - name: Run Tauri functional evidence on macOS and Windows
        if: runner.os != 'Linux'
        run: pnpm verify:tauri-real-runtime
