name: Tauri Terminal Performance

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Ref to check out (defaults to the workflow ref)
        required: false
        type: string
      runs:
        description: Number of native runtime samples
        required: false
        type: string
  schedule:
    - cron: '30 8 * * *'

jobs:
  terminal-perf:
    name: Tauri terminal runtime performance
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      PEBBLE_TERMINAL_PERF_RUNS: ${{ inputs.runs || '3' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: runtime/go/go.mod
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri dependencies
        run: sudo apt-get update && sudo apt-get install -y at-spi2-core dbus-x11 gir1.2-atspi-2.0 libwebkit2gtk-4.1-dev libappindicator3-dev python3-gi librsvg2-dev patchelf xvfb
      - run: pnpm install --frozen-lockfile
      - name: Run renderer contracts and native Tauri performance gate
        run: xvfb-run --auto-servernum dbus-run-session -- node config/scripts/run-tauri-terminal-evidence.mjs --mode perf --output artifacts/tauri-terminal-perf/report.json
      - name: Upload terminal performance evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tauri-terminal-performance
          path: artifacts/tauri-terminal-perf*
          retention-days: 14
          if-no-files-found: error
